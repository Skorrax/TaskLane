<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TaskLane</title>
<link rel="stylesheet" href="lib/flatpickr.min.css">
<link rel="stylesheet" href="lib/flatpickr-dark.css">
<style>
  .flatpickr-calendar { z-index: 200 !important; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #c9d1d9;
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  header {
    padding: 12px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 { font-size: 16px; font-weight: 600; color: #e6edf3; }

  .board {
    display: flex;
    gap: 12px;
    padding: 12px;
    flex: 1;
    overflow: auto;
    align-items: flex-start;
  }

  .column {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    min-width: 230px;
    max-width: 230px;
    display: flex;
    flex-direction: column;
  }

  .column-header {
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #30363d;
    gap: 6px;
  }

  .column-header .col-title {
    font-weight: 600; font-size: 13px; color: #e6edf3;
    cursor: pointer; padding: 2px 4px; border-radius: 4px;
    border: 1px solid transparent; background: none;
    flex: 1; min-width: 0; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .column-header .col-title:hover { border-color: #30363d; }
  .column-header .col-title:focus { outline: none; border-color: #58a6ff; background: #0d1117; }

  .column-header .task-count {
    background: #30363d; color: #8b949e; font-size: 11px;
    padding: 1px 6px; border-radius: 10px; flex-shrink: 0;
  }

  .column-header .col-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .column-body {
    padding: 6px; flex: 1; overflow-y: auto;
    display: flex; flex-direction: column; gap: 6px;
  }

  .column-footer { padding: 6px; border-top: 1px solid #30363d; }

  .column-body::-webkit-scrollbar { width: 5px; }
  .column-body::-webkit-scrollbar-track { background: transparent; }
  .column-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  .task-card {
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 10px; cursor: grab;
    transition: border-color 0.15s, box-shadow 0.15s; position: relative;
  }
  .task-card:hover { border-color: #58a6ff; }
  .task-card.dragging { opacity: 0.5; cursor: grabbing; }
  .task-card.done { opacity: 0.6; }
  .task-card.done .task-title { text-decoration: line-through; color: #8b949e; }
  .task-card.overdue { border-color: #f85149; background: #1a0f0f; }
  .task-card.overdue .task-due { color: #f85149; font-weight: 600; }

  .task-title { font-size: 13px; font-weight: 500; color: #e6edf3; margin-bottom: 3px; word-break: break-word; }
  .task-desc {
    font-size: 11px; color: #8b949e; margin-bottom: 6px; word-break: break-word;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .task-meta { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .task-due { font-size: 10px; color: #8b949e; display: flex; align-items: center; gap: 3px; }
  .task-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
  .task-card:hover .task-actions { opacity: 1; }

  .btn {
    background: none; border: none; cursor: pointer; border-radius: 5px;
    display: inline-flex; align-items: center; justify-content: center; transition: background 0.15s;
  }
  .btn-icon { width: 24px; height: 24px; color: #8b949e; font-size: 14px; }
  .btn-icon:hover { background: #30363d; color: #e6edf3; }
  .btn-icon.danger:hover { background: #3d1214; color: #f85149; }

  .btn-add-task {
    width: 100%; padding: 6px; color: #8b949e; font-size: 12px;
    text-align: left; display: flex; align-items: center; gap: 5px;
  }
  .btn-add-task:hover { background: #1c2128; color: #e6edf3; }

  .btn-add-column {
    min-width: 180px; max-width: 180px; padding: 12px; color: #8b949e; font-size: 13px;
    border: 2px dashed #30363d; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    flex-shrink: 0; height: fit-content;
  }
  .btn-add-column:hover { border-color: #58a6ff; color: #58a6ff; background: rgba(88,166,255,0.05); }

  .btn-primary { background: #238636; color: #fff; padding: 5px 12px; font-size: 12px; font-weight: 500; border-radius: 5px; }
  .btn-primary:hover { background: #2ea043; }
  .btn-secondary { background: #21262d; color: #c9d1d9; padding: 5px 12px; font-size: 12px; border-radius: 5px; }
  .btn-secondary:hover { background: #30363d; }

  .inline-form { background: #0d1117; border: 1px solid #58a6ff; border-radius: 6px; padding: 10px; }
  .inline-form input, .inline-form textarea {
    width: 100%; background: #161b22; border: 1px solid #30363d; border-radius: 5px;
    color: #e6edf3; padding: 6px 8px; font-size: 12px; font-family: inherit;
    margin-bottom: 6px; outline: none; transition: border-color 0.15s;
  }
  .inline-form input:focus, .inline-form textarea:focus { border-color: #58a6ff; }
  .inline-form textarea { resize: vertical; min-height: 50px; }
  .inline-form .form-row { display: flex; gap: 6px; align-items: center; }

  .column-body.drag-over { background: rgba(88,166,255,0.05); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px;
    padding: 20px; width: 380px; max-width: 95vw; overflow: visible;
  }
  .modal h2 { font-size: 15px; color: #e6edf3; margin-bottom: 14px; }
  .modal label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 3px; font-weight: 500; }
  .modal input, .modal textarea, .modal select {
    width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 5px;
    color: #e6edf3; padding: 6px 8px; font-size: 12px; font-family: inherit;
    margin-bottom: 10px; outline: none;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #58a6ff; }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal .modal-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 6px; }

  .checkbox-wrapper { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; cursor: pointer; }
  .checkbox-wrapper input[type="checkbox"] { width: 14px; height: 14px; margin: 0; accent-color: #238636; cursor: pointer; }
  .checkbox-wrapper span { font-size: 12px; color: #c9d1d9; }
</style>
</head>
<body>

<header>
  <h1>TaskLane</h1>
</header>

<div class="board" id="board"></div>

<div class="modal-overlay" id="editModal" style="display:none">
  <div class="modal">
    <h2>Aufgabe bearbeiten</h2>
    <label for="editTitle">Titel *</label>
    <input type="text" id="editTitle" placeholder="Titel eingeben">
    <label for="editDesc">Beschreibung</label>
    <textarea id="editDesc" placeholder="Beschreibung (optional)"></textarea>
    <label for="editDue">Fälligkeitsdatum</label>
    <input type="text" id="editDue">
    <label for="editColumn">Spalte</label>
    <select id="editColumn"></select>
    <label class="checkbox-wrapper">
      <input type="checkbox" id="editDone">
      <span>Erledigt</span>
    </label>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="btnCancelEdit">Abbrechen</button>
      <button class="btn btn-primary" id="btnSaveEdit">Speichern</button>
    </div>
  </div>
</div>

<script src="lib/flatpickr.min.js"></script>
<script src="lib/flatpickr-de.js"></script>
<script src="popup.js"></script>
</body>
</html>
