<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskLane</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/de.js"></script>
<style>
  .flatpickr-calendar {
    z-index: 200 !important;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #c9d1d9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #e6edf3;
  }

  .board {
    display: flex;
    gap: 16px;
    padding: 24px;
    flex: 1;
    overflow-x: auto;
    align-items: flex-start;
  }

  /* Column */
  .column {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    min-width: 320px;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 100px);
  }

  .column-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #30363d;
    gap: 8px;
  }

  .column-header .col-title {
    font-weight: 600;
    font-size: 14px;
    color: #e6edf3;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: none;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .column-header .col-title:hover { border-color: #30363d; }

  .column-header .col-title:focus {
    outline: none;
    border-color: #58a6ff;
    background: #0d1117;
  }

  .column-header .task-count {
    background: #30363d;
    color: #8b949e;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .column-header .col-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .column-body {
    padding: 8px;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .column-footer {
    padding: 8px;
    border-top: 1px solid #30363d;
  }

  /* Scrollbar */
  .column-body::-webkit-scrollbar { width: 6px; }
  .column-body::-webkit-scrollbar-track { background: transparent; }
  .column-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  /* Task card */
  .task-card {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px;
    cursor: grab;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }

  .task-card:hover {
    border-color: #58a6ff;
  }

  .task-card.dragging {
    opacity: 0.5;
    cursor: grabbing;
  }

  .task-card.done {
    opacity: 0.6;
  }

  .task-card.done .task-title {
    text-decoration: line-through;
    color: #8b949e;
  }

  .task-card.overdue {
    border-color: #f85149;
    background: #1a0f0f;
  }

  .task-card.overdue .task-due {
    color: #f85149;
    font-weight: 600;
  }

  .task-title {
    font-size: 14px;
    font-weight: 500;
    color: #e6edf3;
    margin-bottom: 4px;
    word-break: break-word;
  }

  .task-desc {
    font-size: 12px;
    color: #8b949e;
    margin-bottom: 8px;
    word-break: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .task-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .task-due {
    font-size: 11px;
    color: #8b949e;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .task-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .task-card:hover .task-actions {
    opacity: 1;
  }

  /* Buttons */
  .btn {
    background: none;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .btn-icon {
    width: 28px;
    height: 28px;
    color: #8b949e;
    font-size: 16px;
  }

  .btn-icon:hover {
    background: #30363d;
    color: #e6edf3;
  }

  .btn-icon.danger:hover {
    background: #3d1214;
    color: #f85149;
  }

  .btn-add-task {
    width: 100%;
    padding: 8px;
    color: #8b949e;
    font-size: 13px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-add-task:hover {
    background: #1c2128;
    color: #e6edf3;
  }

  .btn-add-column {
    min-width: 320px;
    max-width: 320px;
    padding: 16px;
    color: #8b949e;
    font-size: 14px;
    border: 2px dashed #30363d;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
    height: fit-content;
  }

  .btn-add-column:hover {
    border-color: #58a6ff;
    color: #58a6ff;
    background: rgba(88,166,255,0.05);
  }

  .btn-primary {
    background: #238636;
    color: #fff;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
  }

  .btn-primary:hover { background: #2ea043; }

  .btn-secondary {
    background: #21262d;
    color: #c9d1d9;
    padding: 6px 14px;
    font-size: 13px;
    border-radius: 6px;
  }

  .btn-secondary:hover { background: #30363d; }

  /* Inline form */
  .inline-form {
    background: #0d1117;
    border: 1px solid #58a6ff;
    border-radius: 8px;
    padding: 12px;
  }

  .inline-form input,
  .inline-form textarea {
    width: 100%;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    margin-bottom: 8px;
    outline: none;
    transition: border-color 0.15s;
  }

  .inline-form input:focus,
  .inline-form textarea:focus {
    border-color: #58a6ff;
  }

  .inline-form textarea {
    resize: vertical;
    min-height: 60px;
  }

  .inline-form .form-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* Drop indicator */
  .drop-zone {
    min-height: 40px;
    transition: background 0.15s;
    border-radius: 6px;
  }

  .column-body.drag-over {
    background: rgba(88,166,255,0.05);
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 24px;
    width: 420px;
    max-width: 90vw;
  }

  .modal h2 {
    font-size: 16px;
    color: #e6edf3;
    margin-bottom: 16px;
  }

  .modal label {
    display: block;
    font-size: 12px;
    color: #8b949e;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .modal input,
  .modal textarea,
  .modal select {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    margin-bottom: 12px;
    outline: none;
  }

  .modal input:focus,
  .modal textarea:focus,
  .modal select:focus {
    border-color: #58a6ff;
  }

  .modal textarea { resize: vertical; min-height: 80px; }

  .modal .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 8px;
  }

  .checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    cursor: pointer;
  }

  .checkbox-wrapper input[type="checkbox"] {
    width: 16px;
    height: 16px;
    margin: 0;
    accent-color: #238636;
    cursor: pointer;
  }

  .checkbox-wrapper span {
    font-size: 13px;
    color: #c9d1d9;
  }
</style>
</head>
<body>

<header>
  <h1>TaskLane</h1>
</header>

<div class="board" id="board"></div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" style="display:none">
  <div class="modal">
    <h2>Aufgabe bearbeiten</h2>
    <label for="editTitle">Titel *</label>
    <input type="text" id="editTitle" placeholder="Titel eingeben">
    <label for="editDesc">Beschreibung</label>
    <textarea id="editDesc" placeholder="Beschreibung (optional)"></textarea>
    <label for="editDue">Faelligkeitsdatum</label>
    <input type="date" id="editDue">
    <label for="editColumn">Spalte</label>
    <select id="editColumn"></select>
    <label class="checkbox-wrapper">
      <input type="checkbox" id="editDone">
      <span>Erledigt</span>
    </label>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeEditModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'taskboard_data';

let state = loadState();

function defaultState() {
  return {
    columns: [
      { id: genId(), title: 'Zu erledigen', tasks: [] },
      { id: genId(), title: 'In Bearbeitung', tasks: [] },
      { id: genId(), title: 'Erledigt', tasks: [] },
    ]
  };
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return defaultState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isOverdue(task) {
  return task.due && !task.done && task.due <= today();
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  return `${d}.${m}.${y}`;
}

// ---- Rendering ----

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  state.columns.forEach(col => {
    board.appendChild(renderColumn(col));
  });

  // Add column button
  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-add-column';
  addBtn.innerHTML = '<span>+</span> Neue Spalte';
  addBtn.onclick = () => addColumn();
  board.appendChild(addBtn);

  saveState();
}

function renderColumn(col) {
  const el = document.createElement('div');
  el.className = 'column';
  el.dataset.colId = col.id;

  const activeTasks = col.tasks.filter(t => !t.done).length;

  // Header
  const header = document.createElement('div');
  header.className = 'column-header';
  header.innerHTML = `
    <input class="col-title" value="${escHtml(col.title)}"
      onchange="renameColumn('${col.id}', this.value)"
      onkeydown="if(event.key==='Enter')this.blur()">
    <span class="task-count">${activeTasks}</span>
    <div class="col-actions">
      <button class="btn btn-icon danger" title="Spalte loeschen" onclick="deleteColumn('${col.id}')">&#x2715;</button>
    </div>
  `;
  el.appendChild(header);

  // Body
  const body = document.createElement('div');
  body.className = 'column-body';
  body.dataset.colId = col.id;

  body.addEventListener('dragover', e => {
    e.preventDefault();
    body.classList.add('drag-over');
  });
  body.addEventListener('dragleave', () => {
    body.classList.remove('drag-over');
  });
  body.addEventListener('drop', e => {
    e.preventDefault();
    body.classList.remove('drag-over');
    const taskId = e.dataTransfer.getData('text/plain');
    moveTask(taskId, col.id);
  });

  col.tasks.forEach(task => {
    body.appendChild(renderTask(task, col.id));
  });

  el.appendChild(body);

  // Footer: add task
  const footer = document.createElement('div');
  footer.className = 'column-footer';
  footer.innerHTML = `<button class="btn btn-add-task" onclick="showInlineForm('${col.id}', this)">
    <span>+</span> Aufgabe hinzufuegen
  </button>`;
  el.appendChild(footer);

  return el;
}

function renderTask(task, colId) {
  const card = document.createElement('div');
  card.className = 'task-card';
  if (task.done) card.classList.add('done');
  if (isOverdue(task)) card.classList.add('overdue');
  card.draggable = true;
  card.dataset.taskId = task.id;

  card.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', task.id);
    card.classList.add('dragging');
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
  });

  let html = `<div class="task-title">${escHtml(task.title)}</div>`;
  if (task.desc) {
    html += `<div class="task-desc">${escHtml(task.desc)}</div>`;
  }

  html += `<div class="task-meta">`;
  if (task.due) {
    html += `<span class="task-due">&#128197; ${formatDate(task.due)}</span>`;
  } else {
    html += `<span></span>`;
  }
  html += `<div class="task-actions">
    <button class="btn btn-icon" title="${task.done ? 'Nicht erledigt' : 'Erledigt'}" onclick="toggleDone('${task.id}')">
      ${task.done ? '&#x21A9;' : '&#x2713;'}
    </button>
    <button class="btn btn-icon" title="Bearbeiten" onclick="openEditModal('${task.id}')">&#x270E;</button>
    <button class="btn btn-icon danger" title="Loeschen" onclick="deleteTask('${task.id}')">&#x2715;</button>
  </div>`;
  html += `</div>`;

  card.innerHTML = html;
  return card;
}

// ---- Inline form for adding tasks ----

function showInlineForm(colId, btn) {
  const footer = btn.parentElement;
  footer.innerHTML = `
    <div class="inline-form">
      <input type="text" id="newTitle_${colId}" placeholder="Titel *" autofocus
        onkeydown="if(event.key==='Enter'){event.preventDefault();submitInlineForm('${colId}')}
                   if(event.key==='Escape')render()">
      <textarea id="newDesc_${colId}" placeholder="Beschreibung (optional)"
        onkeydown="if(event.key==='Escape')render()"></textarea>
      <div class="form-row">
        <input type="date" id="newDue_${colId}" style="flex:1">
        <button class="btn btn-primary" onclick="submitInlineForm('${colId}')">Erstellen</button>
        <button class="btn btn-secondary" onclick="render()">Abbrechen</button>
      </div>
    </div>
  `;
  document.getElementById(`newTitle_${colId}`).focus();
  flatpickr(`#newDue_${colId}`, {
    locale: 'de',
    dateFormat: 'Y-m-d',
    altInput: true,
    altFormat: 'd.m.Y',
    allowInput: true,
    theme: 'dark',
  });
}

function submitInlineForm(colId) {
  const title = document.getElementById(`newTitle_${colId}`).value.trim();
  if (!title) {
    document.getElementById(`newTitle_${colId}`).focus();
    return;
  }
  const desc = document.getElementById(`newDesc_${colId}`).value.trim();
  const due = document.getElementById(`newDue_${colId}`).value;

  const col = state.columns.find(c => c.id === colId);
  if (!col) return;

  col.tasks.push({
    id: genId(),
    title,
    desc: desc || '',
    due: due || '',
    done: false,
  });

  render();
}

// ---- Column actions ----

function addColumn() {
  state.columns.push({
    id: genId(),
    title: 'Neue Spalte',
    tasks: [],
  });
  render();
  // Focus the new column title for immediate rename
  const inputs = document.querySelectorAll('.col-title');
  const last = inputs[inputs.length - 1];
  if (last) { last.focus(); last.select(); }
}

function renameColumn(colId, newTitle) {
  const col = state.columns.find(c => c.id === colId);
  if (col) col.title = newTitle.trim() || col.title;
  saveState();
}

function deleteColumn(colId) {
  const col = state.columns.find(c => c.id === colId);
  if (!col) return;
  const msg = col.tasks.length
    ? `Spalte "${col.title}" mit ${col.tasks.length} Aufgabe(n) wirklich loeschen?`
    : `Spalte "${col.title}" wirklich loeschen?`;
  if (!confirm(msg)) return;
  state.columns = state.columns.filter(c => c.id !== colId);
  render();
}

// ---- Task actions ----

function toggleDone(taskId) {
  for (const col of state.columns) {
    const task = col.tasks.find(t => t.id === taskId);
    if (task) {
      task.done = !task.done;
      break;
    }
  }
  render();
}

function deleteTask(taskId) {
  for (const col of state.columns) {
    const idx = col.tasks.findIndex(t => t.id === taskId);
    if (idx !== -1) {
      col.tasks.splice(idx, 1);
      break;
    }
  }
  render();
}

function moveTask(taskId, targetColId) {
  let task = null;
  for (const col of state.columns) {
    const idx = col.tasks.findIndex(t => t.id === taskId);
    if (idx !== -1) {
      task = col.tasks.splice(idx, 1)[0];
      break;
    }
  }
  if (!task) return;
  const targetCol = state.columns.find(c => c.id === targetColId);
  if (targetCol) targetCol.tasks.push(task);
  render();
}

// ---- Edit Modal ----

let editingTaskId = null;

function openEditModal(taskId) {
  editingTaskId = taskId;
  let task = null;
  for (const col of state.columns) {
    task = col.tasks.find(t => t.id === taskId);
    if (task) break;
  }
  if (!task) return;

  document.getElementById('editTitle').value = task.title;
  document.getElementById('editDesc').value = task.desc;
  document.getElementById('editDue').value = task.due;
  document.getElementById('editDone').checked = task.done;

  // Populate column select
  const sel = document.getElementById('editColumn');
  sel.innerHTML = '';
  for (const col of state.columns) {
    const opt = document.createElement('option');
    opt.value = col.id;
    opt.textContent = col.title;
    if (col.tasks.some(t => t.id === taskId)) opt.selected = true;
    sel.appendChild(opt);
  }

  document.getElementById('editModal').style.display = 'flex';
  document.getElementById('editTitle').focus();
  flatpickr('#editDue', {
    locale: 'de',
    dateFormat: 'Y-m-d',
    altInput: true,
    altFormat: 'd.m.Y',
    allowInput: true,
    theme: 'dark',
  });
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
  editingTaskId = null;
}

function saveEdit() {
  const title = document.getElementById('editTitle').value.trim();
  if (!title) {
    document.getElementById('editTitle').focus();
    return;
  }

  const desc = document.getElementById('editDesc').value.trim();
  const due = document.getElementById('editDue').value;
  const done = document.getElementById('editDone').checked;
  const targetColId = document.getElementById('editColumn').value;

  // Find and update task, move if needed
  let task = null;
  let sourceCol = null;
  for (const col of state.columns) {
    const found = col.tasks.find(t => t.id === editingTaskId);
    if (found) {
      task = found;
      sourceCol = col;
      break;
    }
  }
  if (!task) return;

  task.title = title;
  task.desc = desc;
  task.due = due;
  task.done = done;

  // Move to different column if changed
  if (sourceCol.id !== targetColId) {
    sourceCol.tasks = sourceCol.tasks.filter(t => t.id !== task.id);
    const targetCol = state.columns.find(c => c.id === targetColId);
    if (targetCol) targetCol.tasks.push(task);
  }

  closeEditModal();
  render();
}

// Close modal on outside click
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeEditModal();
});

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('editModal').style.display === 'flex') {
    closeEditModal();
  }
});

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Initial render
render();
</script>
</body>
</html>
